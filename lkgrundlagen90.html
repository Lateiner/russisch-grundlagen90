<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Lernkartei: Zahlen & Begriffe</title>
    <style>
        :root {
            --primary-green: #27ae60;
            --light-green: #2ecc71;
            --bg-green: #f0fdf4;
            --dark-green: #1b5e20;
            --card-white: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-green);
            color: var(--dark-green);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.8rem;
        }

        .progress-info {
            font-weight: bold;
            margin-bottom: 20px;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Flashcard Styles */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            aspect-ratio: 3 / 2;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--shadow);
            border-radius: 15px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            background: var(--card-white);
            border: 4px solid var(--primary-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f9f9f9;
            border-color: var(--light-green);
        }

        .word-text {
            word-wrap: break-word;
            max-width: 100%;
            line-height: 1.2;
            transition: font-size 0.2s ease;
        }

        .label {
            position: absolute;
            top: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        button {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button:hover {
            background-color: var(--dark-green);
        }

        button:active {
            transform: translateY(2px);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #6c757d;
        }

        .keyboard-hint {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; }
            button { padding: 10px 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Russisch Vokabeltrainer</h1>
        
        <div class="progress-info" id="progress">1 / 100</div>

        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div class="label">Russisch</div>
                    <div class="word-text" id="front-text">Загрузка...</div>
                </div>
                <div class="card-face card-back">
                    <div class="label">Deutsch</div>
                    <div class="word-text" id="back-text">Laden...</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()" id="prevBtn">← Vorherige</button>
            <button onclick="nextCard()" id="nextBtn">Nächste →</button>
            <button onclick="shuffleCards()" class="btn-secondary">🔀 Mischen</button>
            <button onclick="toBeginning()" class="btn-secondary">🏠 Anfang</button>
        </div>

        <div class="keyboard-hint">
            <strong>Tastatur-Steuerung:</strong><br>
            Leertaste / Enter: Umdrehen | Pfeiltasten: Navigation | Pos1: Anfang
        </div>
    </div>

    <script>
        // Die Vokabelliste
        const vocabularyRaw = `
1. пя́ть – fünf
2. ше́сть – sechs
3. се́мь – sieben
4. во́семь – acht
5. де́вять – neun
6. де́сять – zehn
7. оди́ннадцать – elf
8. двена́дцать – zwölf
9. трина́дцать – dreizehn
10. четы́рнадцать – vierzehn
11. пятна́дцать – fünfzehn
12. шестна́дцать – sechzehn
13. семна́дцать – siebzehn
14. восемна́дцать – achtzehn
15. девятна́дцать – neunzehn
16. два́дцать – zwanzig
17. три́дцать – dreißig
18. со́рок – vierzig
19. пятьдеся́т – fünfzig
20. sechsдеся́т – sechzig
21. семьдеся́т – siebzig
22. восемьдеся́т – achtzig
23. девяно́сто – neunzig
24. сто́ – hundert
25. числи́тельное – Zahlwort
26. количественное числи́тельное – Kardinalzahl
27. паде́ж – Kasus, Fall
28. имени́тельный паде́ж – Nominativ
29. роди́тельный паде́ж – Genitiv
30. да́тельный паде́ж – Dativ
31. вини́тельный паде́ж – Akkusativ
32. твори́тельный паде́ж – Instrumental
33. предло́жный паде́ж – Präpositiv
34. продолжа́ть / продолжи́ть – fortsetzen, weitermachen
35. говори́ть / поговори́ть – sprechen
36. изменя́ть / измени́ть – verändern, beugen (grammatikalisch)
37. зна́ть / узна́ть – wissen, erfahren
38. начина́ть / нача́ть – anfangen, beginnen
39. испо́льзовать / воспо́льзоваться – benutzen, verwenden
40. смотре́ть / посмотре́ть – schauen, ansehen
41. напомина́ть / напомни́ть – erinnern
42. интересова́ться / поинтересова́ться – sich interessieren
43. расска́зывать / рассказа́ть – erzählen
44. остана́вливать / останови́ть – anhalten, stoppen
45. писа́ть / написа́ть – schreiben
46. тренирова́ться / потренирова́ться – trainieren, üben
47. чита́ть / прочита́ть – lesen
48. ду́мать / поду́мать – denken
49. понима́ть / поня́ть – verstehen
50. дари́ть / подари́ть – schenken
51. любова́ться / полюбова́ться – bewundern, betrachten
52. вспомина́ть / вспо́мнить – sich erinnern
53. покупа́ть / купи́ть – kaufen
54. е́хать / пое́хать – fahren
55. ви́деть / уви́деть – sehen
56. горди́ться / погорди́ться – stolz sein
57. ма́ркер – Marker
58. де́рево – Baum
59. сестра́ – Schwester
60. студе́нт – Student
61. студе́нтка – Studentin
62. зда́ние – Gebäude
63. челове́к – Mensch
64. подру́га – Freundin
65. худо́жник – Maler, Künstler
66. расска́з – Erzählung
67. поэ́т – Dichter
68. экску́рсия – Exkursion, Ausflug
69. ба́бушка – Großmutter
70. де́душка – Großvater
71. карти́на – Bild, Gemälde
72. заня́тие – Unterricht, Beschäftigung
73. тетра́дь – Heft
74. спи́сок – Liste
75. пода́рок – Geschenk
76. путеше́ствие – Reise
77. пло́щадь – Platz
78. ко́шка – Katze
79. я́блоко – Apfel
80. кни́га – Buch
81. ма́шина – Auto
82. окно́ – Fenster
83. изве́стный – bekannt
84. люби́мый – Lieblings-, geliebt
85. краси́вый – schön
86. но́вый – neu
87. ста́рый – alt
88. ма́ленький – klein
89. похо́жий – ähnlich
90. существи́тельное – Substantiv
91. прилага́тельное – Adjektiv
92. мно́жественное число́ – Plural, Mehrzahl
93. фо́рма – Form
94. оконча́ние – Endung
95. ча́сть – Teil
96. необы́чный – ungewöhnlich
97. ударе́ние – Betonung
98. табли́ца – Tabelle
99. упражне́ние – Übung
100. уда́ча – Glück, Erfolg
`;

        let cards = [];
        let currentIndex = 0;

        // Daten verarbeiten
        function parseData() {
            const lines = vocabularyRaw.trim().split('\n');
            cards = lines.map(line => {
                // Trenne Nummerierung ab und teile bei " – "
                const content = line.replace(/^\d+\.\s*/, '');
                const parts = content.split(' – ');
                return {
                    front: parts[0] ? parts[0].trim() : '',
                    back: parts[1] ? parts[1].trim() : ''
                };
            });
        }

        // Anzeige aktualisieren
        function updateUI() {
            const cardElement = document.getElementById('card');
            const frontText = document.getElementById('front-text');
            const backText = document.getElementById('back-text');
            const progress = document.getElementById('progress');

            // Karte zurückdrehen bevor Inhalt wechselt
            cardElement.classList.remove('flipped');

            setTimeout(() => {
                const currentCard = cards[currentIndex];
                frontText.innerText = currentCard.front;
                backText.innerText = currentCard.back;
                progress.innerText = `${currentIndex + 1} / ${cards.length}`;

                // Dynamische Schriftgröße
                adjustFontSize(frontText, currentCard.front);
                adjustFontSize(backText, currentCard.back);

                // Buttons deaktivieren/aktivieren
                document.getElementById('prevBtn').disabled = currentIndex === 0;
                document.getElementById('nextBtn').disabled = currentIndex === cards.length - 1;
            }, 150);
        }

        function adjustFontSize(element, text) {
            let baseSize = 2.5; // rem
            if (text.length > 30) baseSize = 1.3;
            else if (text.length > 20) baseSize = 1.6;
            else if (text.length > 15) baseSize = 2.0;
            element.style.fontSize = baseSize + "rem";
        }

        // Aktionen
        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                updateUI();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        function shuffleCards() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            updateUI();
        }

        function toBeginning() {
            currentIndex = 0;
            updateUI();
        }

        // Tastatur-Events
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ':
                case 'Enter':
                    e.preventDefault();
                    flipCard();
                    break;
                case 'ArrowLeft':
                    prevCard();
                    break;
                case 'ArrowRight':
                    nextCard();
                    break;
                case 'Home':
                    toBeginning();
                    break;
            }
        });

        // Initialisierung
        parseData();
        updateUI();
    </script>
</body>
</html>
